<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="24" height="24" rx="5" fill="#111827"/>
  <!-- Square sunglasses logo: temple arms, left lens, nose bridge, right lens, right arm -->
  <!-- Left temple arm -->
  <rect x="0.5" y="10.25" width="2" height="2" rx="0.5" fill="url(#g)"/>
  <!-- Left lens (square with slight rounded corners) -->
  <rect x="2.5" y="8.5" width="7.5" height="6" rx="1" fill="url(#g)"/>
  <!-- Nose bridge -->
  <rect x="10" y="10.75" width="4" height="1.5" rx="0.5" fill="url(#g)"/>
  <!-- Right lens -->
  <rect x="14" y="8.5" width="7.5" height="6" rx="1" fill="url(#g)"/>
  <!-- Right temple arm -->
  <rect x="21.5" y="10.25" width="2" height="2" rx="0.5" fill="url(#g)"/>
</svg>
